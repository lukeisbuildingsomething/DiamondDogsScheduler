{% extends "base.html" %}

{% block title %}Login - Templo{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-indigo-50 border border-indigo-200 rounded-lg p-4 mb-6">
        <p class="text-indigo-800 text-sm">
            <strong>First time here?</strong> <a href="/request-account" class="underline font-medium text-indigo-700 hover:text-indigo-900">Request an account</a> and you'll get access once approved.
        </p>
    </div>
    
    <div class="bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Welcome</h1>
        <p class="text-gray-600 mb-6">Sign in to Templo</p>
        
        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                    placeholder="you@example.com"
                >
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                    placeholder="Enter your password (leave blank if new user)"
                >
            </div>
            
            <button 
                type="submit"
                class="w-full bg-indigo-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-indigo-700 transition-colors"
            >
                Continue
            </button>
        </form>
    </div>
</div>
{% endblock %}
