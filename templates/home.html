{% extends "base.html" %}

{% block title %}Create a Poll - Diamond Dogs Scheduler{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Create a Poll</h1>
        <p class="text-gray-600 mb-6">Schedule a group event by selecting dates that work for everyone.</p>
        
        <form action="/create" method="POST" class="space-y-6">
            <div>
                <label for="admin_email" class="block text-sm font-medium text-gray-700 mb-1">Your Email</label>
                <input 
                    type="email" 
                    id="admin_email" 
                    name="admin_email" 
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                    placeholder="you@example.com"
                    value="{{ user_email or '' }}"
                >
            </div>
            
            <div>
                <label for="poll_name" class="block text-sm font-medium text-gray-700 mb-1">Poll Name</label>
                <input 
                    type="text" 
                    id="poll_name" 
                    name="poll_name" 
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                    placeholder="Team Meeting, Birthday Party, etc."
                >
            </div>
            
            <button 
                type="submit"
                class="w-full bg-indigo-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-indigo-700 transition-colors"
            >
                Next: Select Dates
            </button>
        </form>
    </div>
</div>
{% endblock %}
